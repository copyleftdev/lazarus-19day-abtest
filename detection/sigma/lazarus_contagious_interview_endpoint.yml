title: Lazarus Contagious Interview - VS Code Workspace Telemetry Exfiltration
id: c3d4e5f6-7890-4cde-f012-345678901cde
status: experimental
description: |
    Detects malicious workspace initialization scripts that collect system
    telemetry and exfiltrate it to attacker-controlled infrastructure,
    as observed in Lazarus Contagious Interview campaigns.
references:
    - https://github.com/toxy4ny/lazarus-code
    - https://thehackernews.com/2026/03/north-korean-hackers-abuse-vs-code-auto.html
author: vajra-sec-experiment
date: 2026/04/08
tags:
    - attack.execution
    - attack.t1059.007  # Command and Scripting Interpreter: JavaScript
    - attack.collection
    - attack.t1119       # Automated Collection
    - attack.exfiltration
    - attack.t1041       # Exfiltration Over C2 Channel
level: high

logsource:
    category: process_creation
    product: windows

detection:
    # Node.js executing workspace init scripts
    selection_node_init:
        Image|endswith: '\node.exe'
        CommandLine|contains:
            - 'init-workspace'
            - 'workspace-init'
            - 'setup-workspace'

    # PowerShell variant
    selection_ps_init:
        Image|endswith: '\powershell.exe'
        CommandLine|contains:
            - 'init-workspace.ps1'
            - 'VSCode-Workspace-Init'

    # Bash variant via WSL or Git Bash
    selection_bash_init:
        Image|endswith:
            - '\bash.exe'
            - '\sh.exe'
        CommandLine|contains: 'init-workspace.sh'

    # VS Code launching suspicious child processes
    selection_vscode_child:
        ParentImage|endswith: '\Code.exe'
        Image|endswith:
            - '\node.exe'
            - '\powershell.exe'
            - '\cmd.exe'
        CommandLine|contains:
            - 'collectTelemetry'
            - 'sendToTracker'
            - 'phishing-tracker'

    condition: selection_node_init or selection_ps_init or selection_bash_init or selection_vscode_child

falsepositives:
    - Legitimate workspace initialization scripts (review CommandLine for tracker URLs)
---
title: Lazarus PylangGhost RAT Persistence
id: d4e5f6a7-8901-4def-0123-456789012def
status: experimental
description: |
    Detects PylangGhost RAT persistence mechanisms including registry
    modifications, scheduled tasks, and file artifacts.
references:
    - https://any.run/cybersecurity-blog/pylangghost-malware-analysis/
author: vajra-sec-experiment
date: 2026/04/08
tags:
    - attack.persistence
    - attack.t1547.001  # Registry Run Keys
    - attack.t1053.005  # Scheduled Task
level: critical

logsource:
    category: registry_set
    product: windows

detection:
    selection_registry:
        TargetObject|contains: '\CurrentVersion\Run'
        Details|contains:
            - 'NodeHelper'
            - 'csshost.exe'
            - 'nvidiaRelease'
            - 'update.vbs'

    condition: selection_registry

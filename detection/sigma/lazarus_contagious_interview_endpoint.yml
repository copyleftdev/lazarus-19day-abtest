title: Lazarus OtterCookie Wallet Extension Theft
id: f6a7b8c9-0123-4f01-2345-678901234f01
status: experimental
description: Detects OtterCookie targeting browser cryptocurrency extension data
references:
    - https://redasgard.com/blog/hunting-lazarus-part3-infrastructure-too-perfect
author: vajra-sec-experiment
date: 2026/04/08
tags:
    - attack.credential_access
    - attack.t1555.003  # Credentials from Web Browsers
level: critical

logsource:
    category: file_access
    product: windows

detection:
    selection_extension_dirs:
        TargetFilename|contains:
            - '\nkbihfbeogaeaoehlefnkodbefgpgknn'   # MetaMask
            - '\bfnaelmomeimhlpmgjnjophhpkkoljpa'     # Phantom
            - '\dmkamcknogkgcdfhhbddcghachkejeap'     # Keplr
            - '\fhbohimaelbohpjbbldcngcnapndodjp'     # Binance Chain
            - '\aholpfdialjgjfhomihkjbmgjidlcdno'     # Core
            - '\cgeeodpfagjceefieflmdfphplkenlfk'     # Tonkeeper

    selection_process:
        Image|endswith:
            - '\node.exe'
            - '\python.exe'
            - '\csshost.exe'

    condition: selection_extension_dirs and selection_process

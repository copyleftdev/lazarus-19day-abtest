title: Lazarus PylangGhost Scheduled Task Persistence
id: e5f6a7b8-9012-4ef0-1234-567890123ef0
status: experimental
description: Detects PylangGhost/OtterCookie scheduled task creation for persistence
references:
    - https://any.run/cybersecurity-blog/pylangghost-malware-analysis/
    - https://redasgard.com/blog/hunting-lazarus-part3-infrastructure-too-perfect
author: vajra-sec-experiment
date: 2026/04/08
tags:
    - attack.persistence
    - attack.t1053.005
level: critical

logsource:
    category: process_creation
    product: windows

detection:
    selection_schtasks:
        Image|endswith: '\schtasks.exe'
        CommandLine|contains:
            - 'NodeUpdate'
            - 'Runtime Broker'
            - 'Windows Update Script'

    selection_startup:
        TargetFilename|endswith:
            - '\Startup\Windows Update Script.pyw'
            - '\Startup\update.vbs'

    condition: selection_schtasks or selection_startup
